# ILI9481 Userspace Framebuffer Daemon — Configuration
#
# INI-style key=value format.
# Lines starting with # or ; are comments.
# Unknown keys are silently ignored.

[display]
# Target refresh rate in frames per second (1–60)
fps = 30

# SPI clock speed in MHz for the display bus (default: 12)
# The ILI9486 datasheet allows up to 20 MHz for write operations,
# but real-world shields may have signal integrity issues above 16 MHz.
# Try 14 or 16 if 12 is too slow; reduce if you see visual artifacts.
display_speed = 14

# Source framebuffer device to mirror to the TFT display
# Typically /dev/fb0 (HDMI via vc4drmfb)
fb_device = /dev/fb0

# Expected Raspberry Pi desktop render size.
# install.sh uses this to set the boot video mode so UI elements stay legible
# before fbcp scales the image down to the 480x320 TFT.
render_width = 720
render_height = 480

# Scaling behaviour when the framebuffer aspect ratio does not match 480x320.
# fit     = preserve aspect ratio and add black bars
# stretch = fill the whole panel and distort the image
scale_mode = fit

[touch]
# Enable XPT2046 touch support (0 = disabled, 1 = enabled)
# WARNING: This panel's touch controller shares SPI0 pins with the display bus.
# Leave this disabled unless you are explicitly testing touch and accept that
# reads may interfere with display output stability on some setups.
enable_touch = 0

# SPI device for the XPT2046 touch controller
spi_device = /dev/spidev0.1

# SPI clock speed in Hz
spi_speed = 1000000

# Inland / MPI3501 touch orientation defaults for landscape mirroring.
touch_swap_xy = 1
touch_invert_x = 1
touch_invert_y = 0

# Raw XPT2046 calibration range. Adjust only if edge taps do not register.
touch_raw_min = 200
touch_raw_max = 3900
